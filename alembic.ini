# Alembic configuration for the ImmunoSense server data layer.
# The DB URL is resolved at runtime from DATABASE_URL (see migrations/env.py),
# NOT hardcoded here, so the same migrations run against Supabase Postgres
# (production) and SQLite (local dev/tests).

[alembic]
script_location = server/db/migrations
prepend_sys_path = .
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
